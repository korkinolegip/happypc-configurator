version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: happypc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/happypc
      SECRET_KEY: dev-secret-key-change-in-production
      FRONTEND_URL: http://localhost:3000
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_BOT_NAME: ""
      VK_CLIENT_ID: ""
      VK_CLIENT_SECRET: ""
      VK_REDIRECT_URI: http://localhost:3000/auth/vk/callback
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - ./design:/app/static:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: builder
    environment:
      VITE_API_URL: ""
      VITE_BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  uploads_data:
