<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход через Telegram</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #aaa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    p { font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div id="tg-widget"></div>
  <p>Нажмите кнопку для входа через Telegram</p>
  <script>
    var params = new URLSearchParams(window.location.search);
    var botName = params.get('bot') || 'happypcrubot';
    var callbackUrl = window.location.origin + '/api/auth/telegram/callback';

    var s = document.createElement('script');
    s.src = 'https://telegram.org/js/telegram-widget.js?22';
    s.setAttribute('data-telegram-login', botName);
    s.setAttribute('data-size', 'large');
    s.setAttribute('data-radius', '8');
    s.setAttribute('data-auth-url', callbackUrl);
    s.setAttribute('data-request-access', 'write');
    s.async = true;
    document.getElementById('tg-widget').appendChild(s);
  </script>
</body>
</html>
