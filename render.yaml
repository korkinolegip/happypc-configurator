databases:
  - name: happypc-db
    plan: free
    databaseName: happypc
    user: happypc

services:
  - type: web
    name: happypc-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: happypc-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://happypc-frontend.onrender.com

  - type: web
    name: happypc-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://happypc-backend.onrender.com
